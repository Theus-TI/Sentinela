<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sentinel EDR - Advanced Command Center for Host Intrusion Detection">
    <title>Sentinel EDR | Command Center v10</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #070a12;
            --bg-secondary: #0c1120;
            --bg-card: rgba(12, 17, 32, 0.85);
            --bg-card-hover: rgba(18, 25, 45, 0.95);
            --border-subtle: rgba(56, 189, 248, 0.08);
            --border-accent: rgba(56, 189, 248, 0.2);
            --border-danger: rgba(244, 63, 94, 0.3);
            --text-primary: #e2e8f0;
            --text-secondary: #64748b;
            --text-muted: #475569;
            --cyan: #22d3ee;
            --cyan-dim: rgba(34, 211, 238, 0.15);
            --cyan-glow: rgba(34, 211, 238, 0.4);
            --emerald: #10b981;
            --emerald-dim: rgba(16, 185, 129, 0.12);
            --red: #f43f5e;
            --red-dim: rgba(244, 63, 94, 0.12);
            --red-glow: rgba(244, 63, 94, 0.5);
            --amber: #f59e0b;
            --amber-dim: rgba(245, 158, 11, 0.12);
            --blue: #3b82f6;
            --blue-dim: rgba(59, 130, 246, 0.12);
            --radius: 10px;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', system-ui, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── SCAN LINE OVERLAY ─── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.03) 2px, rgba(0, 0, 0, 0.03) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        /* ─── TOP NAV BAR ─── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(7, 10, 18, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--cyan), var(--emerald));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 20px var(--cyan-glow);
        }

        .topbar-title {
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #fff, var(--cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .topbar-status {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .status-pill.online {
            background: var(--emerald-dim);
            color: var(--emerald);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-pill.online .dot {
            width: 7px; height: 7px;
            background: var(--emerald);
            border-radius: 50%;
            animation: pulse-dot 2s ease infinite;
        }

        .topbar-time {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ─── MAIN LAYOUT ─── */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 28px 32px;
        }

        /* ─── STAT CARDS ROW ─── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .stat-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-accent);
            transform: translateY(-2px);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
        }

        .stat-card.cyan::before { background: linear-gradient(90deg, var(--cyan), transparent); }
        .stat-card.emerald::before { background: linear-gradient(90deg, var(--emerald), transparent); }
        .stat-card.blue::before { background: linear-gradient(90deg, var(--blue), transparent); }
        .stat-card.red::before { background: linear-gradient(90deg, var(--red), transparent); }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .stat-card.cyan .stat-icon { background: var(--cyan-dim); }
        .stat-card.emerald .stat-icon { background: var(--emerald-dim); }
        .stat-card.blue .stat-icon { background: var(--blue-dim); }
        .stat-card.red .stat-icon { background: var(--red-dim); }

        .stat-label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 42px;
            font-weight: 900;
            line-height: 1;
            color: #fff;
        }

        .stat-card.red .stat-value { color: var(--red); text-shadow: 0 0 20px var(--red-glow); }

        /* ─── GRID: ENGINES + FEED ─── */
        .content-grid {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 20px;
            min-height: 500px;
        }

        /* ─── LEFT PANEL (Engines + Radar) ─── */
        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h3 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-body { padding: 16px 20px; }

        /* Engine Items */
        .engine-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .engine-item:last-child { border-bottom: none; }

        .engine-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .badge {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            letter-spacing: 0.5px;
        }

        .badge.ok { background: var(--emerald-dim); color: var(--emerald); border: 1px solid rgba(16, 185, 129, 0.25); }
        .badge.err { background: var(--red-dim); color: var(--red); border: 1px solid rgba(244, 63, 94, 0.25); }
        .badge.warn { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245, 158, 11, 0.25); }

        .badge-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        .badge.ok .badge-dot { background: var(--emerald); box-shadow: 0 0 4px var(--emerald); }
        .badge.err .badge-dot { background: var(--red); box-shadow: 0 0 4px var(--red); }
        .badge.warn .badge-dot { background: var(--amber); box-shadow: 0 0 4px var(--amber); }

        /* ─── RADAR ─── */
        .radar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px;
        }

        .radar-container {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.03), transparent 70%);
            border: 1px solid rgba(34, 211, 238, 0.12);
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.6);
        }

        .radar-grid-lines {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(34, 211, 238, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.07) 1px, transparent 1px);
            background-size: 20px 20px;
            border-radius: 50%;
        }

        .radar-ring-inner {
            position: absolute;
            top: 25%; left: 25%; right: 25%; bottom: 25%;
            border: 1px solid rgba(34, 211, 238, 0.12);
            border-radius: 50%;
        }

        .radar-ring-outer {
            position: absolute;
            top: 10%; left: 10%; right: 10%; bottom: 10%;
            border: 1px solid rgba(34, 211, 238, 0.06);
            border-radius: 50%;
        }

        .radar-center-dot {
            position: absolute;
            top: 50%; left: 50%;
            width: 6px; height: 6px;
            background: var(--cyan);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px var(--cyan);
        }

        .radar-sweep-beam {
            position: absolute;
            top: 50%; left: 50%;
            width: 50%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan));
            transform-origin: left center;
            animation: sweep 3s linear infinite;
        }

        .radar-label {
            margin-top: 14px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--cyan);
            transition: color 0.3s;
        }

        /* Radar Attack Mode */
        .radar-container.attack {
            border-color: rgba(244, 63, 94, 0.4);
            box-shadow: inset 0 0 50px rgba(244, 63, 94, 0.2), 0 0 30px rgba(244, 63, 94, 0.15);
        }

        .radar-container.attack .radar-grid-lines {
            background-image:
                linear-gradient(rgba(244, 63, 94, 0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(244, 63, 94, 0.12) 1px, transparent 1px);
        }

        .radar-container.attack .radar-sweep-beam {
            background: linear-gradient(90deg, transparent, var(--red));
            animation-duration: 0.7s;
        }

        .radar-container.attack .radar-center-dot {
            background: var(--red);
            box-shadow: 0 0 12px var(--red);
        }

        /* ─── LIVE FEED (Right Panel) ─── */
        .feed-header-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rec-dot {
            width: 8px;
            height: 8px;
            background: var(--red);
            border-radius: 50%;
            animation: pulse-dot 1s ease infinite;
        }

        .feed-list {
            padding: 16px 20px;
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            flex: 1;
        }

        .feed-list::-webkit-scrollbar { width: 4px; }
        .feed-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 4px; }

        /* Alert Row */
        .alert-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-left: 3px solid var(--red);
            border-radius: 6px;
            transition: all 0.25s ease;
            animation: slideIn 0.3s ease-out;
        }

        .alert-row:hover {
            background: rgba(244, 63, 94, 0.05);
            transform: translateX(4px);
            border-color: rgba(244, 63, 94, 0.15);
        }

        .alert-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }

        .alert-icon {
            font-size: 22px;
            filter: drop-shadow(0 0 6px rgba(244, 63, 94, 0.5));
            flex-shrink: 0;
        }

        .alert-text h4 {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .alert-text p {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
        }

        .btn-kill {
            flex-shrink: 0;
            background: transparent;
            color: var(--red);
            border: 1px solid rgba(244, 63, 94, 0.4);
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .btn-kill:hover {
            background: var(--red);
            color: #fff;
            box-shadow: 0 0 20px var(--red-glow);
            transform: scale(1.04);
        }

        .btn-kill:active { transform: scale(0.97); }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 350px;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 13px;
            gap: 12px;
            opacity: 0.6;
        }

        .empty-state svg { opacity: 0.4; }

        /* Connection Status */
        .conn-status {
            text-align: center;
            padding: 12px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 1px;
            border-radius: 6px;
            margin: 10px 20px;
        }
        .conn-status.offline {
            background: var(--amber-dim);
            color: var(--amber);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        .conn-status.online {
            background: var(--emerald-dim);
            color: var(--emerald);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* ─── ANIMATIONS ─── */
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Kill-Switch Button */
        .btn-killswitch {
            background: transparent;
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: var(--red);
            padding: 6px 14px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-killswitch:hover {
            background: var(--red);
            color: #fff;
            box-shadow: 0 0 20px var(--red-glow);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 1100px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .content-grid { grid-template-columns: 1fr; }
            .container { padding: 20px 16px; }
        }

        @media (max-width: 600px) {
            .stats-row { grid-template-columns: 1fr; }
            .topbar { padding: 12px 16px; }
            .topbar-title { font-size: 13px; letter-spacing: 2px; }
            .alert-text p { max-width: 180px; }
        }
    </style>
</head>
<body>

    <!-- TOP NAV BAR -->
    <nav class="topbar" role="banner">
        <div class="topbar-brand">
            <div class="topbar-logo" aria-hidden="true">🛡️</div>
            <span class="topbar-title">Sentinel EDR</span>
        </div>
        <div class="topbar-status">
            <button class="btn-killswitch" onclick="killSwitch()" title="Isolar rede de emergencia">KILL-SWITCH</button>
            <div class="status-pill online" role="status" aria-label="System online">
                <div class="dot"></div>
                <span>SYSTEM ACTIVE</span>
            </div>
            <div class="topbar-time" id="clock" aria-label="Current time"></div>
        </div>
    </nav>

    <main class="container">
        <!-- STAT CARDS -->
        <section class="stats-row" aria-label="Security statistics">
            <div class="stat-card cyan" id="card-files">
                <div class="stat-icon">📁</div>
                <div class="stat-label">Files Secured</div>
                <div class="stat-value" id="stat-files">--</div>
            </div>
            <div class="stat-card blue" id="card-packets">
                <div class="stat-icon">🌐</div>
                <div class="stat-label">Packets Blocked</div>
                <div class="stat-value" id="stat-packets" style="color:var(--blue)">--</div>
            </div>
            <div class="stat-card red" id="card-threats">
                <div class="stat-icon">💀</div>
                <div class="stat-label">Threats Killed</div>
                <div class="stat-value" id="stat-threats">--</div>
            </div>
            <div class="stat-card emerald" id="card-engines">
                <div class="stat-icon">⚙️</div>
                <div class="stat-label">Engines Online</div>
                <div class="stat-value" id="stat-engines" style="color:var(--emerald)">--</div>
            </div>
            <div class="stat-card cyan" id="card-honeypot">
                <div class="stat-icon">🎯</div>
                <div class="stat-label">Honeypot Trips</div>
                <div class="stat-value" id="stat-honeypot">--</div>
            </div>
        </section>

        <!-- ENGINES + LIVE FEED GRID -->
        <div class="content-grid">
            <!-- LEFT: Engines + Radar -->
            <aside class="left-panel" aria-label="Security modules">
                <div class="panel-card">
                    <div class="panel-header">
                        <h3>⚡ Security Modules</h3>
                    </div>
                    <div class="panel-body" id="engine-container" role="list" aria-label="Engine status list">
                        <div class="conn-status offline">CONNECTING TO SENTINEL API...</div>
                    </div>
                </div>

                <div class="panel-card">
                    <div class="panel-header">
                        <h3>📡 Network Radar</h3>
                    </div>
                    <div class="radar-wrapper">
                        <div class="radar-container" id="radar" aria-label="Network radar visualization">
                            <div class="radar-grid-lines"></div>
                            <div class="radar-ring-outer"></div>
                            <div class="radar-ring-inner"></div>
                            <div class="radar-center-dot"></div>
                            <div class="radar-sweep-beam"></div>
                        </div>
                        <div class="radar-label" id="radar-label">SCANNING PERIMETER</div>
                    </div>
                </div>
            </aside>

            <!-- RIGHT: Live Threat Feed -->
            <section class="panel-card" aria-label="Live threat feed">
                <div class="panel-header">
                    <h3>
                        <span class="feed-header-row"><span class="rec-dot" aria-hidden="true"></span> Live Threat Feed</span>
                    </h3>
                    <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);letter-spacing:1px">REAL-TIME</span>
                </div>
                <div class="feed-list" id="alerts-container" role="log" aria-live="polite">
                    <div class="empty-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 12l2 2 4-4"/></svg><span>AWAITING SENTINEL CONNECTION...</span></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        const API_PORT = new URLSearchParams(window.location.search).get('port') || '1337';
        const API_BASE = `http://127.0.0.1:${API_PORT}`;
        const engineContainer = document.getElementById('engine-container');
        const alertContainer = document.getElementById('alerts-container');
        const radar = document.getElementById('radar');
        const radarLabel = document.getElementById('radar-label');
        const clockEl = document.getElementById('clock');

        // XSS Protection
        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Clock
        function updateClock() {
            clockEl.textContent = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Adaptive Polling
        let idleTicks = 0;
        let pollMs = 500;

        async function fetchData() {
            try {
                const res = await fetch(`${API_BASE}/api/status`);
                const d = await res.json();

                document.getElementById('stat-files').textContent = d.monitored_files;
                document.getElementById('stat-packets').textContent = d.packets_dropped;
                document.getElementById('stat-threats').textContent = d.threats_killed;
                document.getElementById('stat-honeypot').textContent = d.honeypot_trips || 0;

                // Engines
                let engHTML = '';
                let onlineCount = 0;
                if (d.engines) {
                    d.engines.forEach(e => {
                        const isOk = e.status === 'OK';
                        const isWarn = e.status === 'WARNING';
                        const cls = isOk ? 'ok' : isWarn ? 'warn' : 'err';
                        if (isOk) onlineCount++;
                        engHTML += `<div class="engine-item" role="listitem"><span class="engine-name">${esc(e.name)}</span><span class="badge ${cls}"><span class="badge-dot"></span>${esc(e.status)}</span></div>`;
                    });
                }
                document.getElementById('stat-engines').textContent = `${onlineCount}/${d.engines ? d.engines.length : 0}`;
                if (engineContainer.innerHTML !== engHTML) engineContainer.innerHTML = engHTML;

                // Alerts
                let alertHTML = '';
                if (!d.alerts || d.alerts.length === 0) {
                    alertHTML = `<div class="empty-state"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/><path d="M9 12l2 2 4-4"/></svg><span>NO ANOMALIES IN PERIMETER</span></div>`;
                } else {
                    d.alerts.forEach(a => {
                        alertHTML += `<div class="alert-row"><div class="alert-info"><span class="alert-icon">☠️</span><div class="alert-text"><h4>${esc(a.title)}</h4><p>${esc(a.desc)}</p></div></div><button class="btn-kill" data-threat-id="${esc(a.id)}" aria-label="Exterminate threat">EXTERMINATE</button></div>`;
                    });
                }
                if (alertContainer.innerHTML !== alertHTML) alertContainer.innerHTML = alertHTML;

                // Radar state
                const hasThreats = d.alerts && d.alerts.length > 0;
                const dropsChanged = radar.dataset.lastDrop && String(d.packets_dropped) !== radar.dataset.lastDrop;

                if (hasThreats || dropsChanged) {
                    radar.classList.add('attack');
                    radarLabel.style.color = 'var(--red)';
                    radarLabel.textContent = hasThreats ? 'THREAT DETECTED' : 'PACKET BLOCKED';
                    if (!hasThreats) setTimeout(() => { radarLabel.textContent = 'SCANNING PERIMETER'; radarLabel.style.color = 'var(--cyan)'; }, 1500);
                } else {
                    radar.classList.remove('attack');
                    radarLabel.style.color = 'var(--cyan)';
                    radarLabel.textContent = 'SCANNING PERIMETER';
                }
                radar.dataset.lastDrop = String(d.packets_dropped);

                // Adaptive polling
                if (!d.alerts || d.alerts.length === 0) {
                    idleTicks++;
                    if (idleTicks > 20) pollMs = 5000;
                } else {
                    idleTicks = 0;
                    pollMs = 500;
                }
            } catch (e) {
                console.log('Waiting for Sentinel API...');
                // Show offline status when API is down
                if (engineContainer.querySelector('.conn-status')) {
                    engineContainer.innerHTML = '<div class="conn-status offline">SENTINEL API OFFLINE</div>';
                }
            }
        }

        // Event delegation for kill buttons (XSS-safe: no inline onclick)
        alertContainer.addEventListener('click', function(e) {
            const btn = e.target.closest('.btn-kill');
            if (btn && btn.dataset.threatId) {
                kill(btn.dataset.threatId);
            }
        });

        async function kill(id) {
            await fetch(`${API_BASE}/api/kill`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ threat_id: id })
            });
            fetchData();
        }

        async function killSwitch() {
            if (!confirm('ACAO CRITICA: Isolar toda a rede da maquina?')) return;
            const typed = prompt('Digite ISOLATE para confirmar:');
            if (typed !== 'ISOLATE') { alert('Operação cancelada.'); return; }
            try {
                const res = await fetch(`${API_BASE}/api/killswitch`, { method: 'POST' });
                const d = await res.json();
                alert(d.status === 'isolated' ? `Rede isolada (${d.interface})` : `Erro: ${d.msg}`);
            } catch (e) {
                alert('Falha ao executar kill-switch');
            }
        }

        function loop() {
            fetchData().finally(() => setTimeout(loop, pollMs));
        }

        loop();
    </script>
</body>
</html>
